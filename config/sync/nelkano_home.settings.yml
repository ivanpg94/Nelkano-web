  about_eyebrow: 'What is Nelkano'
  about_title: 'A multisystem emulator with an increasingly solid base'
  about_description: 'Nelkano combines custom emulators, a native Android app, a local library, saves, save states, Nelkano account, friends, web streaming and optional Google Drive synchronization. The goal is a clear experience for opening your own compatible files and testing real compatibility, without promising more than each system can currently deliver.'
  status_eyebrow: 'Current status'
  status_title: 'Real system status'
  status_description: 'Some systems are already very usable; others are still being refined for accuracy and compatibility. Status is based on technical tests and current emulator work.'
  status_items: |-
    CHIP-8|Very stable|Lightweight mature emulation for CHIP-8 programs, with a stable base for input, video and saving.
    Game Boy|Very stable|Solid DMG emulator for opening compatible files, saving and loading, with tests focused on real compatibility.
    Game Boy Color|Advanced|CGB compatibility with color, memory banks, palettes, HDMA and key behavior; still being refined for accuracy.
    Game Boy Advance|Playable and improving|Runs a growing part of the compatible library and is measured with real tests to expand compatibility.
    NES|Playable and very advanced|NES emulation with video, audio, controllers and many important mappers; the test and compatibility suite already provides a very solid base.
    RPG Maker MV/MZ|Functional experimental|WebView/NW.js runtime for games exported by RPG Maker itself, with import, input, audio and saves still evolving.
    RPG Maker 2000/2003|Preparing own core|Support will use Nelkano own core so it can be integrated into Android without relying on external runtimes.
    Nintendo DS|Active experimental|Current technical focus: ARM9/ARM7, internal scheduling, processor communication, partial 2D/3D video, timings, saves and increasingly demanding boot tests.
  platforms_eyebrow: Platforms
  platforms_title: 'Download on Android'
  platforms_description: 'Real emulation lives in the Android app. The website provides builds, web streaming, compatibility status and a clear project reference.'
  platform_items: |-
    Android|Mobile APK with local library, touch controls, controller support and compatible systems per version.
    Nelkano account|Profile, play activity, friends, online sessions and connected app features.
    Web streaming|Stream a game from Android and open the web viewer with the same account to follow the session.
    Optional Google Drive|Sync library, saves and save states in your own Google account. Nelkano does not store those files on its own servers.
    Web|Official page to download Nelkano, watch streaming, review compatibility and access legal and privacy information.
  differentiators_eyebrow: Experience
  differentiators_title: 'Built to play, test and keep improving'
  differentiators_description: 'Nelkano combines low-level emulation work with a simple experience: download, open your own compatible files and review compatibility status explained honestly.'
  differentiator_items: |-
    Organized library|Group your own files by system, keep recent sessions and make it easier to open them again.
    Google Drive sync|Link your Google account from settings to upload or download library data, saves and save states from your own Drive.
    Saves and save states|The project prioritizes saving, loading and protecting progress in the systems that already support it.
    Account, friends and activity|Sign in to synchronize play time, profile, friends and online features linked to Nelkano.
    Streaming and online|The app prepares connected sessions to stream gameplay, share presence and experiment with multiplayer features.
        Controllers and input|Touch controls and Bluetooth controller support, with input mapping and profiles.
    Transparent compatibility|Each system is described by its real status: very stable, advanced, playable or experimental.
  vision_eyebrow: Roadmap
  vision_title: 'A free base that will keep growing'
  vision_description: 'The priority is improving compatibility, stability and usability on Android, while clearly explaining what each version includes.'
  vision_items: |-
    Improve system accuracy and compatibility
    Keep downloads clear for Android
    Strengthen saves, library, account, friends, streaming, controllers, themes and synchronization
    Publish real status without locked promises
  faq_eyebrow: FAQ
  faq_title: 'Frequently asked questions'
  faq_items: |-
    Does the website emulate files?|No. Real emulation lives in the Android app. This website is for downloads, streaming and project status.
    Which systems does Nelkano support?|The project works on CHIP-8, Game Boy, Game Boy Color, Game Boy Advance, NES, Mega Drive, RPG Maker and Nintendo DS, each with a different compatibility level.
    Is Nelkano free?|Yes. The download available from this website is free. If any feature changes or expands in the future, the page will clearly state what each version includes.
    Does it include games, ROMs or BIOS files?|No. Nelkano does not include ROMs, BIOS files, firmware, saves or protected content. Users must only use files they have rights to use.
    What about RPG Maker 2000/2003?|That support is being prepared as Nelkano own core integrated into Android.
    Is Nintendo DS finished?|No. Nintendo DS is in active development and remains one of the main technical focuses.
  trust_eyebrow: 'Verifiable project'
  trust_title: 'Clear information for the public beta'
  trust_description: 'The first public beta includes documented versioning, compatibility and privacy information so you can review what Nelkano includes before installing it.'
  trust_items: |-
    Releases|Check the public beta, changes, requirements and download verification.|/en/releases
    Security and privacy|Understand permissions, local data, Nelkano account and optional synchronization.|/en/security-privacy
