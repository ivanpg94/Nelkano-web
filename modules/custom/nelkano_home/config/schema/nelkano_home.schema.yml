nelkano_home.settings:
  type: config_object
  label: 'Nelkano home settings'
  mapping:
    es:
      type: mapping
      label: 'Spanish content'
      mapping: &home_language_fields
        nav_language:
          type: string
        hero_enabled:
          type: boolean
        seo_title:
          type: string
        seo_description:
          type: text
        seo_keywords:
          type: string
        hero_badge:
          type: string
        hero_title:
          type: string
        hero_description:
          type: text
        primary_cta:
          type: string
        primary_url:
          type: string
        secondary_cta:
          type: string
        secondary_url:
          type: string
        downloads_enabled:
          type: boolean
        downloads_title:
          type: string
        android_title:
          type: string
        android_channel:
          type: string
        android_description:
          type: text
        android_url:
          type: string
        windows_title:
          type: string
        windows_channel:
          type: string
        windows_description:
          type: text
        windows_url:
          type: string
        about_enabled:
          type: boolean
        about_eyebrow:
          type: string
        about_title:
          type: string
        about_description:
          type: text
        status_enabled:
          type: boolean
        status_eyebrow:
          type: string
        status_title:
          type: string
        status_description:
          type: text
        status_items:
          type: sequence
          sequence:
            type: mapping
            mapping:
              system:
                type: string
              status:
                type: string
              description:
                type: text
        platforms_enabled:
          type: boolean
        platforms_eyebrow:
          type: string
        platforms_title:
          type: string
        platforms_description:
          type: text
        platform_items:
          type: sequence
          sequence:
            type: mapping
            mapping:
              title:
                type: string
              description:
                type: text
        differentiators_enabled:
          type: boolean
        differentiators_eyebrow:
          type: string
        differentiators_title:
          type: string
        differentiators_description:
          type: text
        differentiator_items:
          type: sequence
          sequence:
            type: mapping
            mapping:
              title:
                type: string
              description:
                type: text
        vision_enabled:
          type: boolean
        vision_eyebrow:
          type: string
        vision_title:
          type: string
        vision_description:
          type: text
        vision_items:
          type: sequence
          sequence:
            type: mapping
            mapping:
              text:
                type: text
        faq_enabled:
          type: boolean
        faq_eyebrow:
          type: string
        faq_title:
          type: string
        faq_items:
          type: sequence
          sequence:
            type: mapping
            mapping:
              question:
                type: string
              answer:
                type: text
        trust_enabled:
          type: boolean
        trust_eyebrow:
          type: string
        trust_title:
          type: string
        trust_description:
          type: text
        trust_items:
          type: sequence
          sequence:
            type: mapping
            mapping:
              title:
                type: string
              description:
                type: text
              url:
                type: string
        footer_primary:
          type: text
        footer_secondary:
          type: text
    en:
      type: mapping
      label: 'English content'
      mapping: *home_language_fields

nelkano_home.docs:
  type: config_object
  label: 'Nelkano documentation settings'
  mapping:
    es:
      type: mapping
      label: 'Spanish documentation'
      mapping: &docs_language_fields
        privacy_cookies_seo_title:
          type: string
        privacy_cookies_seo_description:
          type: text
        privacy_cookies_eyebrow:
          type: string
        privacy_cookies_title:
          type: string
        privacy_cookies_intro:
          type: text
        privacy_cookies_sections:
          type: sequence
          sequence:
            type: mapping
            mapping:
              title:
                type: string
              paragraphs:
                type: text
        legal_notice_seo_title:
          type: string
        legal_notice_seo_description:
          type: text
        legal_notice_eyebrow:
          type: string
        legal_notice_title:
          type: string
        legal_notice_intro:
          type: text
        legal_notice_sections:
          type: sequence
          sequence:
            type: mapping
            mapping:
              title:
                type: string
              paragraphs:
                type: text
        releases_seo_title:
          type: string
        releases_seo_description:
          type: text
        releases_eyebrow:
          type: string
        releases_title:
          type: string
        releases_intro:
          type: text
        releases_version:
          type: string
        releases_filename:
          type: string
        releases_date:
          type: string
        releases_requirements:
          type: string
        releases_changes:
          type: sequence
          sequence:
            type: mapping
            mapping:
              text:
                type: text
        releases_notice:
          type: text
        releases_items:
          type: sequence
          sequence:
            type: mapping
            mapping:
              visible:
                type: boolean
              version:
                type: string
              apk_file:
                type: string
              filename:
                type: string
              date:
                type: string
              requirements:
                type: text
              changes:
                type: text
              notice:
                type: text
        compatibility_seo_title:
          type: string
        compatibility_seo_description:
          type: text
        compatibility_eyebrow:
          type: string
        compatibility_title:
          type: string
        compatibility_intro:
          type: text
        compatibility_items:
          type: sequence
          sequence:
            type: mapping
            mapping:
              system:
                type: string
              status:
                type: string
              works:
                type: text
              limitations:
                type: text
              last_review:
                type: string
        security_seo_title:
          type: string
        security_seo_description:
          type: text
        security_eyebrow:
          type: string
        security_title:
          type: string
        security_intro:
          type: text
        security_sections:
          type: sequence
          sequence:
            type: mapping
            mapping:
              title:
                type: string
              description:
                type: text
    en:
      type: mapping
      label: 'English documentation'
      mapping: *docs_language_fields
